server:
  port: 8089

spring:
  application:
    name: mall-seckill
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

  # ShardingSphere读写分离配置
  shardingsphere:
    datasource:
      names: master,slave
      # 主库配置（写操作）
      master:
        type: com.alibaba.druid.pool.DruidDataSource
        driver-class-name: com.mysql.cj.jdbc.Driver
        url: jdbc:mysql://mysql-master:3306/mall_seckill?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
        username: root
        password: root
        druid:
          initial-size: 10
          min-idle: 10
          max-active: 50
          max-wait: 60000
          time-between-eviction-runs-millis: 60000
          min-evictable-idle-time-millis: 300000
          validation-query: SELECT 1
          test-while-idle: true
          test-on-borrow: false
          test-on-return: false
          pool-prepared-statements: true
          max-pool-prepared-statement-per-connection-size: 50
          connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=1000
          web-stat-filter:
            enabled: true
            exclusions: "*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*"
          stat-view-servlet:
            enabled: true
            login-username: admin
            login-password: admin123
      # 从库配置（读操作）
      slave:
        type: com.alibaba.druid.pool.DruidDataSource
        driver-class-name: com.mysql.cj.jdbc.Driver
        url: jdbc:mysql://mysql-slave1:3306,mysql-slave2:3306/mall_seckill?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
        username: reader
        password: 123456
        druid:
          initial-size: 10
          min-idle: 10
          max-active: 50
          max-wait: 60000
          time-between-eviction-runs-millis: 60000
          min-evictable-idle-time-millis: 300000
          validation-query: SELECT 1
          test-while-idle: true
          test-on-borrow: false
          test-on-return: false
          pool-prepared-statements: true
          max-pool-prepared-statement-per-connection-size: 50
          connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=1000
          web-stat-filter:
            enabled: true
            exclusions: "*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*"
          stat-view-servlet:
            enabled: true
            login-username: admin
            login-password: admin123
    
    # 读写分离规则
    masterslave:
      load-balance-algorithm-type: round_robin
      name: ms
      primary-data-source-name: master
      replica-data-source-names: slave
    
    # 性能优化
    props:
      sql:
        show: false
      executor:
        size: 20
  data:
    redis:
      # Redis Sentinel配置
      sentinel:
        master: mymaster  # 主节点名称
        nodes:            # Sentinel节点列表
          - localhost:26379
          - localhost:26380
          - localhost:26381
        database: 0
      # 单节点配置（备用）
      # host: localhost
      # port: 6379
      # database: 0
      password: 123456
      timeout: 3000ms
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: seckill-order-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3

mybatis:
  mapper-locations:
    - classpath:mapper/*.xml

# Sentinel配置
spring-cloud-alibaba-sentinel:
  datasource:
    ds:
      nacos:
        server-addr: localhost:8848
        data-id: ${spring.application.name}-sentinel
        group-id: DEFAULT_GROUP
        rule-type: flow

# Sa-Token配置
sa-token:
  token-name: Authorization
  timeout: 604800
  is-concurrent: true
  is-share: false
  token-style: uuid
  is-read-header: true
  token-prefix: Bearer
  jwt-secret-key: seckill-secret-key123
  is-print: false

# 自定义秒杀配置
seckill:
  # 限流配置
  rate-limit:
    enabled: true
    max-qps: 1000
    per-user-qps: 10
  # 库存配置
  stock:
    cache-key: "seckill:stock:"
    local-cache-size: 1000
    local-cache-timeout: 5000
    expire-seconds: 3600
  # 订单配置
  order:
    topic: seckill-order-topic
    retry-count: 3
    retry-delay: 5000

# 缓存保护配置
cache:
  protection:
    bloom-filter:
      expected-insertions: 100000
      false-positive-rate: 0.01
    lock:
      timeout-seconds: 10
      retry-times: 3
    null-value:
      expire-seconds: 60

management:
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    health:
      show-details: always

knife4j:
  enable: true
  setting:
    language: zh_CN