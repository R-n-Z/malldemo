version: '3.8'

services:
  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: nacos
    environment:
      - MODE=standalone
      - SPRING_DATASOURCE_PLATFORM=mysql
      - MYSQL_SERVICE_HOST=mysql-master
      - MYSQL_SERVICE_PORT=3306
      - MYSQL_SERVICE_DB_NAME=nacos_config
      - MYSQL_SERVICE_USER=root
      - MYSQL_SERVICE_PASSWORD=root
      - NACOS_AUTH_ENABLE=true
      - NACOS_AUTH_IDENTITY_KEY=seckill-identity-key
      - NACOS_AUTH_IDENTITY_VALUE=seckill-identity-value
      - NACOS_AUTH_TOKEN=SecretKey012345678901234567890123456789012345678901234567890
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    volumes:
      - nacos-data:/home/nacos/data
      - nacos-logs:/home/nacos/logs
    depends_on:
      mysql-master:
        condition: service_healthy
    networks:
      - mall-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  nacos-data:
  nacos-logs:

networks:
  mall-network:
    external: true