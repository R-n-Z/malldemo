server:
  port: 8087

spring:
  application:
    name: mall-order
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

  # ShardingSphere读写分离配置
  shardingsphere:
    datasource:
      names: master,slave
      # 主库配置（写操作）
      master:
        type: com.alibaba.druid.pool.DruidDataSource
        driver-class-name: com.mysql.cj.jdbc.Driver
        url: jdbc:mysql://mysql-master:3306/mall_order?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
        username: root
        password: root
        druid:
          initial-size: 10
          min-idle: 10
          max-active: 50
          max-wait: 60000
          time-between-eviction-runs-millis: 60000
          min-evictable-idle-time-millis: 300000
          validation-query: SELECT 1
          test-while-idle: true
          test-on-borrow: false
          test-on-return: false
          pool-prepared-statements: true
          max-pool-prepared-statement-per-connection-size: 50
          connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=1000
          web-stat-filter:
            enabled: true
            exclusions: "*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*"
          stat-view-servlet:
            enabled: true
            login-username: admin
            login-password: admin123
      # 从库配置（读操作）
      slave:
        type: com.alibaba.druid.pool.DruidDataSource
        driver-class-name: com.mysql.cj.jdbc.Driver
        url: jdbc:mysql://mysql-slave1:3306,mysql-slave2:3306/mall_order?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
        username: reader
        password: 123456
        druid:
          initial-size: 10
          min-idle: 10
          max-active: 50
          max-wait: 60000
          time-between-eviction-runs-millis: 60000
          min-evictable-idle-time-millis: 300000
          validation-query: SELECT 1
          test-while-idle: true
          test-on-borrow: false
          test-on-return: false
          pool-prepared-statements: true
          max-pool-prepared-statement-per-connection-size: 50
          connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=1000
          web-stat-filter:
            enabled: true
            exclusions: "*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*"
          stat-view-servlet:
            enabled: true
            login-username: admin
            login-password: admin123
    
    # 读写分离规则
    masterslave:
      load-balance-algorithm-type: round_robin
      name: ms
      primary-data-source-name: master
      replica-data-source-names: slave
    
    # 性能优化
    props:
      sql:
        show: false
      executor:
        size: 20
  data:
    redis:
      # Redis Sentinel配置
      sentinel:
        master: mymaster
        nodes:
          - localhost:26379
          - localhost:26380
          - localhost:26381
        database: 0
      password: 123456
      timeout: 3000ms
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: seckill-order-consumer-group
      auto-offset-reset: earliest

# RocketMQ配置
rocketmq:
  name-server: localhost:9876
  producer:
    group: seckill-order-producer-group
  consumer:
    group: seckill-order-consumer-group
  topic:
    seckill-order: seckill-order-topic
    stock-deduct: stock-deduct-topic
    order-persist: order-persist-topic
    order-timeout: order-timeout-topic

# 订单超时配置
order:
  timeout:
    default-minutes: 30  # 默认超时时间（分钟）
    scan-interval-seconds: 60  # 扫描间隔（秒）

# Sa-Token配置
sa-token:
  token-name: Authorization
  timeout: 604800
  is-concurrent: true
  is-share: false
  token-style: uuid
  is-read-header: true
  token-prefix: Bearer
  jwt-secret-key: order-secret-key123
  is-print: false

mybatis:
  mapper-locations:
    - classpath:mapper/*.xml

management:
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    health:
      show-details: always

knife4j:
  enable: true
  setting:
    language: zh_CN