server:
  port: 8088

spring:
  application:
    name: mall-stock
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_DISCOVERY_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_DISCOVERY_NAMESPACE:public}
        group: DEFAULT_GROUP
      config:
        server-addr: ${NACOS_CONFIG_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_CONFIG_NAMESPACE:public}
        group: DEFAULT_GROUP
        file-extension: yaml
        shared-configs:
          - data-id: common.yaml
            group: DEFAULT_GROUP
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

management:
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    health:
      show-details: always